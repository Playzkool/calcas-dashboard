{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mot de passe réinitialisé</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: Roboto, sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .card {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 1px -1px rgba(0,0,0,.2), 0 1px 1px rgba(0,0,0,.14), 0 1px 3px rgba(0,0,0,.12);
            padding: 32px;
            width: 360px;
            text-align: center;
        }
        .logo {
            display: block;
            height: 80px;
            margin: 0 auto 24px;
        }
        .icon {
            width: 56px;
            height: 56px;
            background: #e8f5e9;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }
        .icon svg { width: 28px; height: 28px; fill: #2e7d32; }
        h1 { font-size: 1rem; font-weight: 500; color: rgba(0,0,0,.87); margin-bottom: 10px; }
        p { font-size: .875rem; color: rgba(0,0,0,.6); line-height: 1.6; margin-bottom: 24px; }
        .btn {
            display: inline-block;
            padding: 8px 22px;
            height: 42px;
            line-height: 26px;
            background: #1976d2;
            color: #fff;
            border-radius: 4px;
            font-family: inherit;
            font-size: .9375rem;
            font-weight: 500;
            letter-spacing: .02857em;
            text-decoration: none;
            text-transform: uppercase;
            transition: background .2s, box-shadow .2s;
            box-shadow: 0 3px 1px -2px rgba(0,0,0,.2), 0 2px 2px rgba(0,0,0,.14), 0 1px 5px rgba(0,0,0,.12);
        }
        .btn:hover {
            background: #1565c0;
            box-shadow: 0 2px 4px -1px rgba(0,0,0,.2), 0 4px 5px rgba(0,0,0,.14), 0 1px 10px rgba(0,0,0,.12);
        }
    </style>
</head>
<body>
    <div class="card">
        <img src="{% static 'registration-react/logo.png' %}" alt="Logo" class="logo">
        <div class="icon">
            <svg viewBox="0 0 24 24"><path d="M9 16.17 4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
        </div>
        <h1>Mot de passe modifié</h1>
        <p>Votre mot de passe a été réinitialisé avec succès.</p>
        <a href="/" class="btn">Se connecter</a>
    </div>
</body>
</html>
