<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-mail envoyé</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Roboto, Arial, sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: #fff; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,.15); padding: 40px; width: 360px; text-align: center; }
        .icon { font-size: 2.5rem; margin-bottom: 16px; }
        h1 { font-size: 1.25rem; font-weight: 500; margin-bottom: 12px; }
        p { font-size: .875rem; color: #555; line-height: 1.6; }
        a { display: block; margin-top: 24px; font-size: .875rem; color: #1976d2; text-decoration: none; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">✉️</div>
        <h1>Vérifiez votre boîte mail</h1>
        <p>Si un compte correspond à cette adresse e-mail, vous recevrez un lien de réinitialisation dans quelques instants.</p>
        <a href="/">← Retour à la connexion</a>
    </div>
</body>
</html>
