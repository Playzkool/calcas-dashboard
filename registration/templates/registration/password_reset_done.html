{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-mail envoyé</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: Roboto, sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .card {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 1px -1px rgba(0,0,0,.2), 0 1px 1px rgba(0,0,0,.14), 0 1px 3px rgba(0,0,0,.12);
            padding: 32px;
            width: 360px;
            text-align: center;
        }
        .logo {
            display: block;
            height: 80px;
            margin: 0 auto 24px;
        }
        .icon {
            width: 56px;
            height: 56px;
            background: #e3f2fd;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }
        .icon svg { width: 28px; height: 28px; fill: #1976d2; }
        h1 { font-size: 1rem; font-weight: 500; color: rgba(0,0,0,.87); margin-bottom: 10px; }
        p { font-size: .875rem; color: rgba(0,0,0,.6); line-height: 1.6; }
        .back {
            display: block;
            margin-top: 24px;
            font-size: .875rem;
            color: #1976d2;
            text-decoration: none;
        }
        .back:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="card">
        <img src="{% static 'registration-react/logo.png' %}" alt="Logo" class="logo">
        <div class="icon">
            <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4-8 5-8-5V6l8 5 8-5v2z"/></svg>
        </div>
        <h1>Vérifiez votre boîte mail</h1>
        <p>Si un compte correspond à cette adresse, vous recevrez un lien de réinitialisation dans quelques instants.</p>
        <a href="/" class="back">← Retour à la connexion</a>
    </div>
</body>
</html>
