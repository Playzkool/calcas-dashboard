{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mot de passe oublié</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: Roboto, sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .card {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 1px -1px rgba(0,0,0,.2), 0 1px 1px rgba(0,0,0,.14), 0 1px 3px rgba(0,0,0,.12);
            padding: 32px;
            width: 360px;
        }
        .logo {
            display: block;
            height: 80px;
            margin: 0 auto 24px;
        }
        h1 {
            font-size: 1rem;
            font-weight: 500;
            color: rgba(0,0,0,.87);
            margin-bottom: 8px;
        }
        p {
            font-size: .875rem;
            color: rgba(0,0,0,.6);
            margin-bottom: 24px;
            line-height: 1.5;
        }
        .field { position: relative; margin-bottom: 16px; }
        .field label {
            display: block;
            font-size: .75rem;
            font-weight: 500;
            color: rgba(0,0,0,.6);
            margin-bottom: 6px;
            letter-spacing: .03em;
        }
        .field input {
            width: 100%;
            padding: 13px 14px;
            border: 1px solid rgba(0,0,0,.23);
            border-radius: 4px;
            font-size: 1rem;
            font-family: inherit;
            color: rgba(0,0,0,.87);
            outline: none;
            transition: border-color .15s;
        }
        .field input:hover { border-color: rgba(0,0,0,.87); }
        .field input:focus { border-color: #1976d2; border-width: 2px; padding: 12px 13px; }
        .btn {
            display: block;
            width: 100%;
            padding: 8px 22px;
            height: 42px;
            background: #1976d2;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-family: inherit;
            font-size: .9375rem;
            font-weight: 500;
            letter-spacing: .02857em;
            cursor: pointer;
            text-transform: uppercase;
            transition: background .2s, box-shadow .2s;
            box-shadow: 0 3px 1px -2px rgba(0,0,0,.2), 0 2px 2px rgba(0,0,0,.14), 0 1px 5px rgba(0,0,0,.12);
        }
        .btn:hover {
            background: #1565c0;
            box-shadow: 0 2px 4px -1px rgba(0,0,0,.2), 0 4px 5px rgba(0,0,0,.14), 0 1px 10px rgba(0,0,0,.12);
        }
        .back {
            display: block;
            text-align: center;
            margin-top: 16px;
            font-size: .875rem;
            color: #1976d2;
            text-decoration: none;
        }
        .back:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="card">
        <img src="{% static 'registration-react/logo.png' %}" alt="Logo" class="logo">
        <h1>Mot de passe oublié ?</h1>
        <p>Entrez votre adresse e-mail. Vous recevrez un lien pour réinitialiser votre mot de passe.</p>
        <form method="post">
            {% csrf_token %}
            <div class="field">
                <label for="{{ form.email.id_for_label }}">Adresse e-mail</label>
                {{ form.email }}
            </div>
            <button type="submit" class="btn">Envoyer le lien</button>
        </form>
        <a href="/" class="back">← Retour à la connexion</a>
    </div>
</body>
</html>
