<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Réinitialisation du mot de passe</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Roboto, Arial, sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: #fff; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,.15); padding: 40px; width: 360px; }
        h1 { font-size: 1.25rem; font-weight: 500; margin-bottom: 8px; }
        p { font-size: .875rem; color: #555; margin-bottom: 24px; }
        label { display: block; font-size: .875rem; margin-bottom: 4px; color: #333; }
        input[type=email] { width: 100%; padding: 12px 14px; border: 1px solid #ccc; border-radius: 4px; font-size: 1rem; outline: none; }
        input[type=email]:focus { border-color: #1976d2; box-shadow: 0 0 0 2px rgba(25,118,210,.2); }
        button { width: 100%; padding: 12px; margin-top: 16px; background: #1976d2; color: #fff; border: none; border-radius: 4px; font-size: 1rem; font-weight: 500; cursor: pointer; letter-spacing: .02em; }
        button:hover { background: #1565c0; }
        .back { display: block; text-align: center; margin-top: 16px; font-size: .875rem; color: #1976d2; text-decoration: none; }
        .back:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Mot de passe oublié ?</h1>
        <p>Entrez votre adresse e-mail. Vous recevrez un lien pour réinitialiser votre mot de passe.</p>
        <form method="post">
            {% csrf_token %}
            <label for="id_email">Adresse e-mail</label>
            {{ form.email }}
            <button type="submit">Envoyer le lien</button>
        </form>
        <a href="/" class="back">← Retour à la connexion</a>
    </div>
</body>
</html>
