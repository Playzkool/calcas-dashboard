server {
    listen 80;

    # Frontend SPA — React Router
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # API Django (sessions CSRF incluses)
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # SÉCURITÉ : /media/ n'est plus exposé publiquement.
    # Auparavant les documents sensibles (santé, état civil de mineurs) étaient
    # servis ici SANS authentification. Ils sont désormais téléchargés via
    # /api/... avec contrôle d'accès Django (cf. rest_api/media.py).
    location /media/ {
        return 404;
    }

    # Fichiers statiques Django (admin) — servis par whitenoise via gunicorn
    location /static/ {
        proxy_pass http://backend:8000;
    }
}
